aws:
  region: us-east-1

dynamodb:
  endpoint: http://localhost:8000

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/turbotax
    username: turbotax
    password: turbotax
  data:
    redis:
      host: localhost
      port: 6379
  kafka:
    bootstrap-servers: localhost:9092

jwt:
  expiry-minutes: 480  # 8 hours for local dev

management:
  tracing:
    sampling:
      probability: 1.0

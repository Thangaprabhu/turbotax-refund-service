spring:
  application:
    name: turbotax-refund-service
  threads:
    virtual:
      enabled: true
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:turbotax}
    username: ${DB_USER:turbotax_user}
    password: ${DB_PASS:turbotax_pass}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: ${KAFKA_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: true
        spring.json.type.mapping: >
          filingCreated:com.turbotax.refund.domain.event.FilingCreatedEvent,
          refundStatusUpdated:com.turbotax.refund.domain.event.RefundStatusUpdatedEvent
    consumer:
      group-id: ${spring.application.name}
      auto-offset-reset: earliest
      key-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.key.delegate.class: org.apache.kafka.common.serialization.StringDeserializer
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.trusted.packages: "com.turbotax.*"
        spring.json.type.mapping: >
          filingCreated:com.turbotax.refund.domain.event.FilingCreatedEvent,
          refundStatusUpdated:com.turbotax.refund.domain.event.RefundStatusUpdatedEvent
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms
  cache:
    type: redis
    redis:
      time-to-live: 14400000  # 4 hours in ms

aws:
  region: ${AWS_REGION:us-east-1}
  secrets:
    jwt-secret-name: ${JWT_SECRET_NAME:dev/turbotax/jwt}
    db-secret-name:  ${DB_SECRET_NAME:dev/turbotax/db}
  kms:
    pii-key-alias: ${PII_KMS_KEY:alias/turbotax-pii}

dynamodb:
  endpoint: ${DYNAMODB_ENDPOINT:}         # empty = use real AWS; set for local
  table:
    filings: ${DYNAMODB_FILINGS_TABLE:turbotax-filings}

jwt:
  expiry-minutes: ${JWT_EXPIRY_MINUTES:15}
  refresh-expiry-days: ${JWT_REFRESH_EXPIRY_DAYS:7}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${OTLP_ENDPOINT:http://localhost:4318/v1/traces}

server:
  port: 8080

logging:
  level:
    com.turbotax: DEBUG
    org.springframework.security: INFO

spring:
  application:
    name: refund-service
  threads:
    virtual:
      enabled: true
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: true
        spring.json.type.mapping: >
          filingCreated:com.turbotax.refund.domain.event.FilingCreatedEvent,
          refundStatusUpdated:com.turbotax.refund.domain.event.RefundStatusUpdatedEvent
    consumer:
      group-id: ${spring.application.name}
      auto-offset-reset: earliest
      key-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.key.delegate.class: org.apache.kafka.common.serialization.StringDeserializer
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.trusted.packages: "com.turbotax.*"
        spring.json.type.mapping: >
          filingCreated:com.turbotax.refund.domain.event.FilingCreatedEvent,
          refundStatusUpdated:com.turbotax.refund.domain.event.RefundStatusUpdatedEvent
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms
  cache:
    type: redis
    redis:
      time-to-live: 14400000  # 4 hours in ms

server:
  port: 8080

aws:
  region: us-east-1
  secrets:
    jwt-secret-name: dev/turbotax/jwt

dynamodb:
  endpoint: http://localhost:8000
  table:
    filings: turbotax-filings

jwt:
  expiry-minutes: 480

services:
  taxpayer-service:
    base-url: http://localhost:8082
  ai-service:
    base-url: http://localhost:8083

cache:
  ttl:
    filings-hours: 4

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${OTLP_ENDPOINT:http://localhost:4318/v1/traces}

logging:
  pattern:
    level: "%5p [${spring.application.name},%X{traceId:-},%X{spanId:-}]"
  level:
    com.turbotax: DEBUG
    org.springframework.security: INFO
